spring.application.name=CadastroDeNinjas
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver=org.h2.Driver
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.show-sql=true
spring.sql.init.mode=always
spring.datasource.driverClassName=org.h2.Driver
spring.h2.console.enabled=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.flyway.enable=true;
spring.flyway.location=classpath:db/migrations
# ConfigurańŃo do Flyway
spring.flyway.enabled=true
# Importante: O caminho deve bater com a sua pasta em resources/db/migration
# Permite que o Flyway limpe o banco se necessßrio (·til em desenvolvimento)
spring.flyway.clean-disabled=false
# Configurań§es do JPA/Hibernate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=none
# Garante que o Flyway procure na pasta correta
spring.flyway.locations=classpath:db/migration
# Forńa o Flyway a rodar mesmo que o banco jß tenha tabelas
spring.flyway.baseline-on-migrate=true


